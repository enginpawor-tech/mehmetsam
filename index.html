<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020609">
<title>MSM Radyo — Canlı Yayın</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --ink:#020609;
  --navy:#060e1c;
  --panel:#0b1628;
  --rule:rgba(255,255,255,0.07);
  --blue:#1d5fe8;
  --blue-dim:#0f3a9a;
  --white:#f0f4ff;
  --grey:#3d5273;
  --grey2:#1e3050;
}

html,body{height:100%;-webkit-text-size-adjust:100%}

body{
  font-family:'Inter',sans-serif;
  background:#020609;
  color:var(--white);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px 16px;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  position:relative;
}

/* ── ARKA PLAN DAİRE EFEKTİ ── */
.bg-canvas{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
  pointer-events:none;
}
.bg-ring{
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(29,95,232,0.06);
  transform:translate(-50%,-50%);
  animation:ringPulse 8s ease-in-out infinite;
}
.bg-ring:nth-child(1){width:300px;height:300px;left:50%;top:50%;animation-delay:0s}
.bg-ring:nth-child(2){width:520px;height:520px;left:50%;top:50%;animation-delay:1.2s}
.bg-ring:nth-child(3){width:760px;height:760px;left:50%;top:50%;animation-delay:2.4s}
.bg-ring:nth-child(4){width:1020px;height:1020px;left:50%;top:50%;animation-delay:3.6s}
.bg-ring:nth-child(5){width:1300px;height:1300px;left:50%;top:50%;animation-delay:4.8s}
@keyframes ringPulse{
  0%,100%{opacity:0.4;border-color:rgba(29,95,232,0.06)}
  50%{opacity:1;border-color:rgba(29,95,232,0.18)}
}

.bg-glow{
  position:absolute;
  border-radius:50%;
  transform:translate(-50%,-50%);
}
.bg-glow-1{
  width:500px;height:500px;
  left:50%;top:50%;
  background:radial-gradient(circle,rgba(10,30,90,0.55) 0%,transparent 70%);
  animation:glowBreathe 6s ease-in-out infinite;
}
.bg-glow-2{
  width:800px;height:400px;
  left:30%;top:70%;
  background:radial-gradient(circle,rgba(8,20,60,0.3) 0%,transparent 70%);
  animation:glowBreathe 9s ease-in-out infinite 2s;
}
.bg-glow-3{
  width:600px;height:600px;
  left:70%;top:30%;
  background:radial-gradient(circle,rgba(15,40,100,0.25) 0%,transparent 70%);
  animation:glowBreathe 7s ease-in-out infinite 4s;
}
@keyframes glowBreathe{
  0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
}

/* içerik z-index */
.top-stripe,.shell{position:relative;z-index:1}

/* ── TOP STRIPE ── */
.top-stripe{
  width:100%;
  max-width:480px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
  padding:0 2px;
  flex-wrap:wrap;
  gap:6px;
}
.school-name{
  font-family:'Syne',sans-serif;
  font-size:9px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--grey);
  line-height:1.4;
}
.live-badge{
  display:flex;align-items:center;gap:6px;
  font-family:'Syne',sans-serif;
  font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--grey);transition:color 0.4s;
  flex-shrink:0;
}
.live-badge.on{color:#e84a1d}
.live-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.live-badge.on .live-dot{animation:blink 1.3s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}

/* ── SHELL ── */
.shell{
  width:100%;max-width:480px;
  background:rgba(6,14,28,0.85);
  border:1px solid var(--rule);
  border-radius:4px;
  overflow:hidden;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

/* ── BANNER ── */
.banner{
  background:rgba(11,22,40,0.9);
  border-bottom:1px solid var(--rule);
  padding:22px 28px 18px;
  display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
}
.banner-kicker{
  font-size:9px;font-weight:500;
  letter-spacing:2.5px;text-transform:uppercase;
  color:var(--blue);margin-bottom:5px;
}
.banner-title{
  font-family:'Syne',sans-serif;
  font-size:28px;font-weight:800;
  color:var(--white);line-height:1;letter-spacing:-0.5px;
}
.banner-title span{color:var(--blue)}
.freq-bars{display:flex;align-items:flex-end;gap:3px;height:32px}
.freq-bar{width:4px;border-radius:2px 2px 0 0;background:var(--blue-dim);transition:height 0.12s ease}

/* ── NOW PLAYING ── */
.now{
  padding:20px 28px;
  border-bottom:1px solid var(--rule);
  display:flex;align-items:center;gap:18px;
}
.plak-wrap{flex-shrink:0;width:72px;height:72px;position:relative}
.plak{
  width:72px;height:72px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,
    var(--ink) 0,var(--ink) 15%,
    transparent 15.5%,transparent 16%,
    #0a1830 16%,#0a1830 25%,#07111f 25%,#07111f 35%,
    #0a1830 35%,#0a1830 45%,#07111f 45%,#07111f 55%,
    #0a1830 55%,#0a1830 65%,#07111f 65%,#07111f 75%,
    #0a1830 75%,#0a1830 85%,#07111f 85%
  );
  border:1px solid rgba(255,255,255,0.06);
  position:relative;will-change:transform;
}
.plak::after{
  content:'';position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:16px;height:16px;border-radius:50%;
  background:var(--blue-dim);
  border:2px solid rgba(255,255,255,0.1);
}
.plak.spin{animation:spin 3.5s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.plak-ring{
  position:absolute;inset:-4px;border-radius:50%;
  border:2px solid transparent;
  border-top-color:var(--blue);border-right-color:var(--blue-dim);
  opacity:0;transition:opacity 0.5s;
  animation:spin 2s linear infinite;
}
.plak-wrap.active .plak-ring{opacity:1}
.now-info{flex:1;min-width:0}
.now-label{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:5px}
.now-title{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:700;
  color:var(--white);line-height:1.3;transition:opacity 0.25s;word-break:break-word;
}
.now-sub{font-size:11px;color:var(--grey);margin-top:4px}

/* ── WAVE ── */
.wave-row{
  padding:0 28px;height:36px;
  display:flex;align-items:center;gap:2px;
  border-bottom:1px solid var(--rule);overflow:hidden;
}
.wave-bar{flex:1;height:3px;border-radius:1px;background:var(--grey2);transform-origin:center;transition:background 0.3s}
.wave-row.active .wave-bar{background:var(--blue)}
.wave-row.active .wave-bar:nth-child(odd){animation:wb 0.75s ease-in-out infinite}
.wave-row.active .wave-bar:nth-child(even){animation:wb 0.75s ease-in-out infinite 0.15s}
.wave-row.active .wave-bar:nth-child(3n){animation:wb 0.75s ease-in-out infinite 0.3s}
.wave-row.active .wave-bar:nth-child(5n){animation:wb 0.75s ease-in-out infinite 0.45s}
@keyframes wb{0%,100%{transform:scaleY(1)}50%{transform:scaleY(7)}}

/* ── CONTROLS ── */
.controls{
  padding:20px 28px;
  display:flex;align-items:center;gap:18px;
  border-bottom:1px solid var(--rule);
}
.btn-play{
  width:54px;height:54px;border-radius:50%;border:none;
  background:var(--blue);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background 0.2s,transform 0.15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.btn-play:active:not(.off){transform:scale(0.91)}
.btn-play.off{background:var(--grey2);cursor:default;opacity:0.5}
.btn-play.loading-state{animation:lpulse 1s ease-in-out infinite}
@keyframes lpulse{0%,100%{opacity:1}50%{opacity:0.4}}
.spin-ico{animation:spin 0.9s linear infinite}
.vol-block{flex:1;display:flex;flex-direction:column;gap:8px}
.vol-top{display:flex;align-items:center;justify-content:space-between}
.vol-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--grey)}
.vol-val{font-size:10px;color:var(--blue);font-weight:500}
input[type=range]{
  -webkit-appearance:none;width:100%;height:3px;
  background:var(--grey2);border-radius:99px;outline:none;cursor:pointer;touch-action:pan-x;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;
  border-radius:50%;background:var(--white);border:3px solid var(--blue);
}
input[type=range]::-moz-range-thumb{
  width:20px;height:20px;border-radius:50%;
  background:var(--white);border:3px solid var(--blue);
}

/* ── FOOTER ── */
.foot{
  padding:12px 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.foot-status{font-size:11px;color:var(--grey)}
.foot-id{
  font-family:'Syne',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--blue-dim);
}

audio{display:none}

@media(max-width:400px){
  .banner{padding:16px 18px 14px}
  .banner-title{font-size:22px}
  .now{padding:16px 18px;gap:12px}
  .wave-row{padding:0 18px}
  .controls{padding:16px 18px}
  .foot{padding:10px 18px}
  .school-name{font-size:8px}
}
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>
  <div class="bg-ring"></div>
  <div class="bg-ring"></div>
  <div class="bg-ring"></div>
  <div class="bg-ring"></div>
  <div class="bg-ring"></div>
</div>

<div class="top-stripe">
  <span class="school-name">Mehmet Şam Mesleki ve Teknik Anadolu Lisesi</span>
  <div class="live-badge" id="liveBadge">
    <div class="live-dot"></div>
    <span id="liveText">Offline</span>
  </div>
</div>

<div class="shell">
  <div class="banner">
    <div>
      <div class="banner-kicker">Canlı Radyo Yayını</div>
      <div class="banner-title">MSM<span>.</span>FM</div>
    </div>
    <div class="freq-bars" id="freqBars">
      <div class="freq-bar" style="height:14px"></div>
      <div class="freq-bar" style="height:22px"></div>
      <div class="freq-bar" style="height:9px"></div>
      <div class="freq-bar" style="height:28px"></div>
      <div class="freq-bar" style="height:18px"></div>
      <div class="freq-bar" style="height:32px"></div>
      <div class="freq-bar" style="height:20px"></div>
      <div class="freq-bar" style="height:10px"></div>
      <div class="freq-bar" style="height:26px"></div>
      <div class="freq-bar" style="height:8px"></div>
      <div class="freq-bar" style="height:18px"></div>
    </div>
  </div>

  <div class="now">
    <div class="plak-wrap" id="plakWrap">
      <div class="plak-ring"></div>
      <div class="plak" id="plak"></div>
    </div>
    <div class="now-info">
      <div class="now-label">Şu an çalıyor</div>
      <div class="now-title" id="songTitle">—</div>
      <div class="now-sub" id="songStatus">Sunucuya bağlanılıyor...</div>
    </div>
  </div>

  <div class="wave-row" id="waveRow">
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
  </div>

  <div class="controls">
    <button class="btn-play off" id="playBtn" aria-label="Oynat">
      <svg id="icoPlay" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
      <svg id="icoPause" style="display:none" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      <svg id="icoLoad" style="display:none" class="spin-ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2v4"/><path d="M12 18v4"/>
        <path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/>
        <path d="M2 12h4"/><path d="M18 12h4"/>
        <path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/>
      </svg>
    </button>
    <div class="vol-block">
      <div class="vol-top">
        <span class="vol-lbl">Ses</span>
        <span class="vol-val" id="volVal">80%</span>
      </div>
      <input type="range" id="volSlider" min="0" max="100" value="80">
    </div>
  </div>

  <div class="foot">
    <span class="foot-status" id="footStatus">Yayın bekleniyor</span>
    <span class="foot-id">MSM Radyo</span>
  </div>
</div>

<audio id="audio" preload="none" playsinline webkit-playsinline x-webkit-airplay="allow"></audio>

<script>
(() => {
  'use strict';

  const API        = 'https://lavish-aloe-petunia.ngrok-free.dev';
  const API_STREAM = 'https://radyo-proxy.enginpawor.workers.dev';
  const POLL_MS     = 3000;
  const MAX_RETRIES = 8;
  const RETRY_DELAYS = [500,1000,1500,2000,3000,4000,6000,8000];
  const NGROK_HEADERS = {'ngrok-skip-browser-warning':'1','Cache-Control':'no-cache'};

  // Buffer ayarları — tampolamayı minimuma indir
  const BUFFER_AHEAD   = 3;    // saniye — bu kadar buffer yeterli, daha fazlası gecikme yaratır
  const BUFFER_TRIM_AT = 8;    // saniye — buffer bu kadar dolunca eski kısımları sil
  const BUFFER_KEEP    = 2;    // silme sonrası bu kadar tut

  const audio      = document.getElementById('audio');
  const playBtn    = document.getElementById('playBtn');
  const icoPlay    = document.getElementById('icoPlay');
  const icoPause   = document.getElementById('icoPause');
  const icoLoad    = document.getElementById('icoLoad');
  const plakWrap   = document.getElementById('plakWrap');
  const plak       = document.getElementById('plak');
  const waveRow    = document.getElementById('waveRow');
  const songTitle  = document.getElementById('songTitle');
  const songStatus = document.getElementById('songStatus');
  const liveBadge  = document.getElementById('liveBadge');
  const liveText   = document.getElementById('liveText');
  const footStatus = document.getElementById('footStatus');
  const volSlider  = document.getElementById('volSlider');
  const volVal     = document.getElementById('volVal');
  const freqBars   = document.getElementById('freqBars');

  const ST = {IDLE:'idle',LOADING:'loading',PLAYING:'playing'};
  let state='idle', isBroadcasting=false, currentSong='', currentStart=0;
  let volume=0.8, retryCount=0, retryTimer=null, userWantsPlay=false;
  let mse=null, sourceBuffer=null, fetchReader=null, fetchAbort=null;
  let freqTimer=null, stallTimer=null;

  audio.volume = volume;

  // Stall detection — ses takılırsa 2 saniye içinde yeniden bağlan
  function resetStallTimer() {
    clearTimeout(stallTimer);
    if (state !== ST.PLAYING) return;
    stallTimer = setTimeout(() => {
      if (state === ST.PLAYING && userWantsPlay && isBroadcasting) {
        retryCount = 0;
        startMSE();
      }
    }, 4000);
  }

  /* ── freq bar animasyon ── */
  function animateFreq(on) {
    clearInterval(freqTimer);
    const bars = freqBars.querySelectorAll('.freq-bar');
    if (!on) {
      const h=[14,22,9,28,18,32,20,10,26,8,18];
      bars.forEach((b,i)=>{b.style.height=(h[i]||14)+'px'});
      return;
    }
    freqTimer = setInterval(()=>{
      bars.forEach(b=>{b.style.height=Math.floor(Math.random()*28+4)+'px'});
    }, 130);
  }

  /* ── volume ── */
  function updateVolume() {
    volume = volSlider.value/100;
    audio.volume = volume;
    volVal.textContent = volSlider.value+'%';
  }
  volSlider.addEventListener('input', updateVolume);
  volSlider.addEventListener('change', updateVolume);
  volSlider.addEventListener('touchmove', updateVolume, {passive:true});

  /* ── UI ── */
  function showIcon(n) {
    icoPlay.style.display  = n==='play'  ? '':'none';
    icoPause.style.display = n==='pause' ? '':'none';
    icoLoad.style.display  = n==='load'  ? '':'none';
  }

  function setState(s) {
    state = s;
    const playing = s===ST.PLAYING;
    const loading = s===ST.LOADING;
    showIcon(loading?'load':playing?'pause':'play');
    plakWrap.classList.toggle('active', playing);
    plak.classList.toggle('spin', playing);
    waveRow.classList.toggle('active', playing);
    playBtn.classList.toggle('loading-state', loading);
    animateFreq(playing);
    if (playing) resetStallTimer();
    else clearTimeout(stallTimer);
  }

  function setBroadcast(on) {
    isBroadcasting = on;
    liveBadge.classList.toggle('on', on);
    liveText.textContent = on ? 'CANLI' : 'Offline';
    playBtn.classList.toggle('off', !on);
  }

  function cleanTitle(t) {
    if (!t || t==='—') return t;
    return t.replace(/\.[a-zA-Z0-9]{2,4}$/, '').trim();
  }

  function setTitle(t) {
    if (t===songTitle.textContent) return;
    songTitle.style.opacity='0';
    setTimeout(()=>{songTitle.textContent=cleanTitle(t);songTitle.style.opacity='1';}, 240);
  }

  function setStatus(t) { songStatus.textContent = t; }

  /* ── buffer trim — tampon dolunca eski kısımları at ── */
  function trimBuffer() {
    if (!sourceBuffer || sourceBuffer.updating || !mse || mse.readyState!=='open') return;
    try {
      const buffered = sourceBuffer.buffered;
      if (!buffered.length) return;
      const bufEnd = buffered.end(buffered.length-1);
      const bufStart = buffered.start(0);
      const totalBuf = bufEnd - bufStart;
      if (totalBuf > BUFFER_TRIM_AT) {
        const removeEnd = audio.currentTime - BUFFER_KEEP;
        if (removeEnd > bufStart + 0.5) {
          sourceBuffer.remove(bufStart, removeEnd);
        }
      }
    } catch(e) {}
  }

  /* ── MSE ── */
  function stopMSE() {
    clearTimeout(stallTimer);
    if (fetchAbort) { fetchAbort.abort(); fetchAbort=null; }
    fetchReader = null;
    audio.pause();
    try { audio.src=''; } catch(e) {}
    if (mse && mse.readyState==='open') { try { mse.endOfStream(); } catch(e) {} }
    mse=null; sourceBuffer=null;
  }

  function startMSE() {
    stopMSE();
    setState(ST.LOADING);
    setStatus('Bağlanıyor...');

    if (!window.MediaSource) { startDirect(); return; }

    mse = new MediaSource();
    audio.src = URL.createObjectURL(mse);
    audio.volume = volume;

    mse.addEventListener('sourceopen', async () => {
      try { sourceBuffer = mse.addSourceBuffer('audio/mpeg'); }
      catch(e) { stopMSE(); startDirect(); return; }

      sourceBuffer.mode = 'sequence';

      // updateend'de buffer trim yap
      sourceBuffer.addEventListener('updateend', trimBuffer);

      fetchAbort = new AbortController();
      const url = API_STREAM + '/stream?t=' + Date.now();

      let response;
      try {
        response = await fetch(url, {
          signal: fetchAbort.signal,
          headers: NGROK_HEADERS
        });
      } catch(e) {
        if (e.name !== 'AbortError') scheduleRetry();
        return;
      }

      if (!response.ok) {
        setStatus('Yayın yok');
        setState(ST.IDLE);
        return;
      }

      fetchReader = response.body.getReader();
      pumpStream();
    }, {once:true});

    audio.play().catch(()=>{});
  }

  async function pumpStream() {
    if (!fetchReader || !sourceBuffer || !mse) return;
    try {
      while (true) {
        const {done, value} = await fetchReader.read();

        if (done) {
          if (userWantsPlay && isBroadcasting) {
            retryCount = 0;
            setTimeout(startMSE, 300); // hızlı yeniden bağlan
          } else {
            setState(ST.IDLE);
            setStatus('Yayın bitti');
          }
          break;
        }

        // sourceBuffer meşgulse bekle
        if (sourceBuffer.updating) {
          await new Promise(r => sourceBuffer.addEventListener('updateend', r, {once:true}));
        }

        if (!sourceBuffer || !mse || mse.readyState!=='open') break;

        try {
          sourceBuffer.appendBuffer(value);
          // veri geldi — stall timer sıfırla
          resetStallTimer();
        } catch(e) {
          if (e.name === 'QuotaExceededError') {
            // Acil trim
            try {
              if (sourceBuffer.buffered.length > 0 && !sourceBuffer.updating) {
                const s = sourceBuffer.buffered.start(0);
                const e2 = audio.currentTime - 1;
                if (e2 > s) {
                  sourceBuffer.remove(s, e2);
                  await new Promise(r => sourceBuffer.addEventListener('updateend', r, {once:true}));
                  try { sourceBuffer.appendBuffer(value); } catch(e3) {}
                }
              }
            } catch(e4) {}
          }
        }
      }
    } catch(e) {
      if (e.name !== 'AbortError' && userWantsPlay && isBroadcasting) {
        setTimeout(scheduleRetry, 200);
      }
    }
  }

  function startDirect() {
    audio.src = API_STREAM + '/stream?t=' + Date.now();
    audio.volume = volume;
    audio.play().catch(()=>scheduleRetry());
  }

  function scheduleRetry() {
    if (!userWantsPlay || !isBroadcasting) { setState(ST.IDLE); return; }
    if (retryCount >= MAX_RETRIES) {
      setState(ST.IDLE);
      setStatus('Bağlanamadı — tekrar dene');
      retryCount = 0;
      return;
    }
    const delay = RETRY_DELAYS[Math.min(retryCount, RETRY_DELAYS.length-1)];
    setStatus('Yeniden bağlanıyor... ('+(retryCount+1)+'/'+MAX_RETRIES+')');
    retryCount++;
    clearTimeout(retryTimer);
    retryTimer = setTimeout(startMSE, delay);
  }

  function stopPlay(reason) {
    userWantsPlay = false;
    clearTimeout(retryTimer);
    clearTimeout(stallTimer);
    stopMSE();
    setState(ST.IDLE);
    setStatus(reason || 'Durduruldu');
    retryCount = 0;
  }

  /* ── buton ── */
  let lastTap = 0;
  function handleInteract(e) {
    e.preventDefault(); e.stopPropagation();
    const now = Date.now();
    if (now-lastTap < 350) return;
    lastTap = now;
    if (!isBroadcasting) return;
    if (state===ST.PLAYING || state===ST.LOADING) stopPlay('Durduruldu');
    else { userWantsPlay=true; retryCount=0; startMSE(); }
  }
  playBtn.addEventListener('click', handleInteract);
  playBtn.addEventListener('touchend', handleInteract, {passive:false});

  /* ── audio events ── */
  audio.addEventListener('playing', () => {
    clearTimeout(retryTimer);
    retryCount = 0;
    setState(ST.PLAYING);
    setStatus('Dinleniyor');
  });
  audio.addEventListener('timeupdate', resetStallTimer); // aktif oynarken stall timer sıfırla
  audio.addEventListener('waiting', () => {
    if (state===ST.PLAYING) {
      setStatus('Tamponlanıyor...');
      // 2 saniye boyunca çözülmezse yeniden bağlan
      clearTimeout(stallTimer);
      stallTimer = setTimeout(() => {
        if (userWantsPlay && isBroadcasting) {
          retryCount = 0;
          startMSE();
        }
      }, 2000);
    }
  });
  audio.addEventListener('error', () => { if (userWantsPlay) scheduleRetry(); });
  audio.addEventListener('ended', () => {
    if (userWantsPlay && isBroadcasting) { retryCount=0; setTimeout(startMSE, 300); }
    else { setState(ST.IDLE); setStatus('Yayın bitti'); }
  });
  audio.addEventListener('stalled', () => {
    if (userWantsPlay && isBroadcasting) {
      clearTimeout(stallTimer);
      stallTimer = setTimeout(()=>{retryCount=0; startMSE();}, 2500);
    }
  });

  /* ── status polling ── */
  async function checkStatus() {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(()=>ctrl.abort(), 5000);
      const res = await fetch(API+'/status', {cache:'no-store',signal:ctrl.signal,headers:NGROK_HEADERS});
      clearTimeout(tid);
      if (!res.ok) throw new Error('HTTP '+res.status);
      const data = await res.json();
      const wasBroadcasting = isBroadcasting;
      setBroadcast(data.broadcasting);
      if (data.broadcasting) {
        if (data.song !== currentSong) {
          setTitle(data.song);
          currentSong = data.song;
          footStatus.textContent = 'Canlı yayın aktif';
        }
        const songChanged = currentStart && data.start_time && currentStart!==data.start_time;
        currentStart = data.start_time;
        if (songChanged && state===ST.PLAYING) { retryCount=0; startMSE(); }
        if (!wasBroadcasting) {
          setStatus('Yayın başladı — ▶ bas');
          if (userWantsPlay) { retryCount=0; startMSE(); }
        }
      } else {
        if (currentSong!=='—') { setTitle('—'); currentSong='—'; }
        currentStart=0;
        footStatus.textContent='Yayın bekleniyor';
        if (state!==ST.IDLE) stopPlay('Şuan yayın yapılmıyor');
        else setStatus('Şuan yayın yapılmıyor');
      }
    } catch(e) {
      setBroadcast(false);
      setTitle('—'); currentSong='—'; currentStart=0;
      footStatus.textContent='Bağlantı yok';
      setStatus('Sunucuya ulaşılamıyor');
      if (state!==ST.IDLE) setState(ST.IDLE);
    }
  }

  document.addEventListener('visibilitychange', ()=>{
    if (document.hidden) return;
    checkStatus();
    if (userWantsPlay && isBroadcasting && state===ST.IDLE) { retryCount=0; startMSE(); }
  });
  window.addEventListener('online', ()=>{checkStatus();if(userWantsPlay&&isBroadcasting){retryCount=0;startMSE();}});
  window.addEventListener('offline', ()=>{setBroadcast(false);setStatus('İnternet bağlantısı yok');});

  checkStatus();
  setInterval(checkStatus, POLL_MS);
})();
</script>
</body>
</html>
